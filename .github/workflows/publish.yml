name: Publish

on:
  push:
    tags: ["v*"]

permissions:
  contents: read

jobs:
  publish:
    name: publish to npm
    runs-on: ubuntu-latest
    permissions:
      contents: read
      id-token: write # required for npm provenance attestation
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0

      - uses: pnpm/action-setup@a7487c7e89a18df4991f7f222e4898a00d66ddda # v4.1.0

      - uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020 # v4.4.0
        with:
          node-version: "24"
          cache: pnpm
          registry-url: "https://registry.npmjs.org"

      - name: Install npm with Trusted Publishing support
        run: npm install --global npm@11.5.1

      - name: Install dependencies (frozen lockfile)
        run: pnpm install --frozen-lockfile

      - name: Type check
        run: pnpm typecheck

      - name: Unit and integration tests
        run: pnpm test

      - name: Build
        run: pnpm build

      - name: Package smoke test
        run: node scripts/package-smoke.mjs

      - name: Verify tag matches version
        run: |
          VERSION="v$(node -p "require('./package.json').version")"
          if [ "$VERSION" != "${{ github.ref_name }}" ]; then
            echo "::error::Tag ${{ github.ref_name }} does not match package.json version $VERSION"
            exit 1
          fi

      - name: Dry-run publish
        run: |
          VERSION="$(node -p "require('./package.json').version")"
          if [[ "$VERSION" == *-* ]]; then DIST_TAG="next"; else DIST_TAG="latest"; fi
          npm publish --dry-run --access public --tag "$DIST_TAG"

      - name: Publish
        run: |
          VERSION="$(node -p "require('./package.json').version")"
          if [[ "$VERSION" == *-* ]]; then DIST_TAG="next"; else DIST_TAG="latest"; fi
          npm publish --provenance --access public --tag "$DIST_TAG"

      - name: Verify published package from a clean install
        shell: bash
        run: |
          set -euo pipefail
          VERSION="$(node -p "require('./package.json').version")"
          PACKAGE_NAME="@adameddahmouni/agent-ready"

          # npm's public registry can take several minutes to propagate a new
          # package version. Wait up to five minutes before treating that as a
          # publication failure.
          for attempt in $(seq 1 30); do
            if npm view "$PACKAGE_NAME@$VERSION" version >/dev/null 2>&1; then break; fi
            if [ "$attempt" = "30" ]; then
              echo "::error::$PACKAGE_NAME@$VERSION did not become visible on npm in time"
              exit 1
            fi
            sleep 10
          done

          TEMP_DIR="$(mktemp -d)"
          cp examples/minimal/agent-ready.yaml "$TEMP_DIR/agent-ready.yaml"
          cd "$TEMP_DIR"
          npm init --yes >/dev/null
          npm install --ignore-scripts --save-dev "$PACKAGE_NAME@$VERSION"

          INSTALLED_VERSION="$(npx --no-install agent-ready --version)"
          if [ "$INSTALLED_VERSION" != "$VERSION" ]; then
            echo "::error::installed version $INSTALLED_VERSION does not match $VERSION"
            exit 1
          fi
          npx --no-install agent-ready validate --config agent-ready.yaml
