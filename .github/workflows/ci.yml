name: CI

on:
  pull_request:
  push:
    branches: [main]

concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

env:
  # Kept in sync with the "engines.node" minimum in package.json; the OS
  # matrix job below additionally exercises other supported versions.
  PRIMARY_NODE_VERSION: "22"

jobs:
  verify:
    name: verify (${{ matrix.os }})
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, windows-latest, macos-latest]
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4

      - uses: actions/setup-node@v4
        with:
          node-version: ${{ env.PRIMARY_NODE_VERSION }}
          cache: pnpm

      - name: Install dependencies (frozen lockfile)
        run: pnpm install --frozen-lockfile

      - name: Check formatting
        run: pnpm format:check

      - name: Lint
        run: pnpm lint

      - name: Type check
        run: pnpm typecheck

      - name: Unit and integration tests
        run: pnpm test

      - name: Build
        run: pnpm build

      - name: Package smoke test
        run: node scripts/package-smoke.mjs

      - name: CLI smoke test - help and version
        shell: bash
        run: |
          node dist/cli/index.js --help
          node dist/cli/index.js --version
          node dist/cli/index.js validate --help
          node dist/cli/index.js inspect --help
          node dist/cli/index.js generate --help
          node dist/cli/index.js check --help
          node dist/cli/index.js analyze --help
          node dist/cli/index.js schema --help
          node dist/cli/index.js doctor --help
          node dist/cli/index.js verify --help

      - name: CLI smoke test - valid examples pass
        shell: bash
        run: |
          node dist/cli/index.js validate --config examples/minimal/agent-ready.yaml
          node dist/cli/index.js validate --config examples/complete-phase-1/agent-ready.yaml
          node dist/cli/index.js inspect --config examples/complete-phase-1/agent-ready.yaml --json

      - name: CLI smoke test - generate dry run
        shell: bash
        run: |
          set -e
          output="$(node dist/cli/index.js generate --config examples/complete-phase-1/agent-ready.yaml --json)"
          echo "$output"
          if echo "$output" | grep -q "ADAPTER_NOT_YET_IMPLEMENTED"; then
            echo "Expected all five example adapters to be implemented" >&2
            exit 1
          fi

      - name: CLI smoke test - analyze documentation drift
        shell: bash
        run: |
          set -e
          output="$(node dist/cli/index.js analyze --json)"
          echo "$output"
          echo "$output" | grep -q '"ok": true'
          echo "$output" | grep -q '"linksChecked"'

      - name: CLI smoke test - invalid examples fail
        shell: bash
        run: |
          set -e
          for example in unknown-field invalid-command-reference invalid-path-traversal unsupported-version; do
            if node dist/cli/index.js validate --config "examples/invalid/$example.yaml" --json; then
              echo "Expected examples/invalid/$example.yaml to fail validation" >&2
              exit 1
            fi
          done

      - name: CLI smoke test - verify dry run (this repo's own contract)
        shell: bash
        run: |
          set -e
          output="$(node dist/cli/index.js verify --json)"
          echo "$output"
          echo "$output" | grep -q '"mode": "dry-run"'
          echo "$output" | grep -q '"id": "build"'

      - name: CLI smoke test - verify --execute (synthetic contract, real process spawning)
        shell: bash
        run: |
          set -e
          tmp="$(mktemp -d)"
          cat > "$tmp/agent-ready.yaml" <<'YAML'
          version: 1
          project:
            name: verify-smoke-test
          commands:
            ok:
              run: node -e "process.exit(0)"
            fail:
              run: node -e "process.exit(1)"
            unreached:
              run: node -e "process.exit(0)"
          verification:
            required:
              - ok
              - fail
              - unreached
          YAML

          output="$(node dist/cli/index.js verify --config "$tmp/agent-ready.yaml" --execute --json || true)"
          echo "$output"
          echo "$output" | grep -q '"status": "passed"'
          echo "$output" | grep -q '"status": "failed"'
          echo "$output" | grep -q '"status": "skipped"'

          if node dist/cli/index.js verify --config "$tmp/agent-ready.yaml" --execute --json; then
            echo "Expected the synthetic contract's failing command to make verify exit non-zero" >&2
            exit 1
          fi

      - name: CLI smoke test - verify --execute --record (evidence file)
        shell: bash
        run: |
          set -e
          tmp="$(mktemp -d)"
          cat > "$tmp/agent-ready.yaml" <<'YAML'
          version: 1
          project:
            name: verify-record-smoke-test
          commands:
            ok:
              run: node -e "process.exit(0)"
          verification:
            required:
              - ok
          YAML

          if node dist/cli/index.js verify --config "$tmp/agent-ready.yaml" --record --json; then
            echo "Expected --record without --execute to fail" >&2
            exit 1
          fi

          output="$(node dist/cli/index.js verify --config "$tmp/agent-ready.yaml" --execute --record --json)"
          echo "$output"
          echo "$output" | grep -q '"recordedTo"'

          evidence="$tmp/agent-ready-verify-result.json"
          if [ ! -f "$evidence" ]; then
            echo "Expected $evidence to exist" >&2
            exit 1
          fi
          cat "$evidence"
          grep -q '"recordedAt"' "$evidence"
          grep -q '"status": "passed"' "$evidence"

  node-versions:
    name: node ${{ matrix.node-version }} (ubuntu-latest)
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        node-version: ["20", "22"]
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4

      - uses: actions/setup-node@v4
        with:
          node-version: ${{ matrix.node-version }}
          cache: pnpm

      - name: Install dependencies (frozen lockfile)
        run: pnpm install --frozen-lockfile

      - name: Type check
        run: pnpm typecheck

      - name: Unit and integration tests
        run: pnpm test

      - name: Build
        run: pnpm build

  dogfood-action:
    name: dogfood composite action (${{ matrix.command }})
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        command: [validate, inspect, generate, check, analyze, schema, doctor, verify]
    steps:
      - uses: actions/checkout@v4

      - name: agent-ready ${{ matrix.command }} (via ./action.yml)
        uses: ./
        with:
          command: ${{ matrix.command }}
          config: ${{ if(matrix.command == 'schema', '', 'examples/complete-phase-1/agent-ready.yaml') }}
          json: "true"

  audit:
    name: dependency audit
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4

      - uses: actions/setup-node@v4
        with:
          node-version: ${{ env.PRIMARY_NODE_VERSION }}
          cache: pnpm

      - name: Install dependencies (frozen lockfile)
        run: pnpm install --frozen-lockfile

      # Informational in this phase: findings are reviewed manually rather
      # than blocking merges. See SECURITY.md for rationale.
      - name: pnpm audit
        run: pnpm audit --audit-level=high
        continue-on-error: true

  action-fail-fast:
    name: composite action fail-fast on unknown subcommand
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      # The step name below contains the unquoted substring command: bogus,
      # which prettier-plugin-yaml's compact-mapping parser would otherwise
      # read as a nested mapping. Single-quoting the scalar suppresses that.
      - name: "agent-ready via ./action.yml with command: bogus (must exit 3)"
        id: fail-fast
        uses: ./
        with:
          command: bogus

      - name: assert the fail-fast case block fired (must be skipped when fail-fast ran)
        if: steps.fail-fast.outcome != 'failure'
        run: |
          echo "::error::agent-ready: action.yml must reject an unknown subcommand (command: bogus); expected the bash case block to emit a ::error annotation that names bogus and exit 3. The step succeeded, meaning the case block regressed."
          exit 1
