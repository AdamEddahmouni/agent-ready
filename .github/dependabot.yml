version: 2
updates:
  - package-ecosystem: "npm"
    directory: "/"
    schedule:
      interval: "weekly"
    versioning-strategy: increase
    open-pull-requests-limit: 5
    labels:
      - dependencies
    ignore:
      # Commander 15 requires Node.js 22.12+, while Agent-Ready supports
      # Node.js 20. Keep receiving compatible Commander 13/14 updates.
      - dependency-name: commander
        versions: [">=15"]
      # TypeScript 6 changes ambient type discovery and requires a deliberate
      # compiler/lint migration. Keep the v0.5 line on the validated TS 5 line.
      - dependency-name: typescript
        versions: [">=6"]

  - package-ecosystem: "github-actions"
    directory: "/"
    schedule:
      interval: "weekly"
    # GitHub Actions are pinned to commit SHAs, so version-tag bumps are
    # informational only. Keep the limit low and review manually.
    open-pull-requests-limit: 2
